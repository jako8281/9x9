<!DOCTYPE html>
<html lang="da">
<head>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" href="favicon.png">
    <meta charset="UTF-8">
    <title>Tabeltræning</title>
    <style>
        body {
            background-color: #333333;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            background-image: url('https://images.pexels.com/photos/1363876/pexels-photo-1363876.jpeg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
        }
        table {
            margin: auto;
            border-collapse: collapse;
        }
        td {
            width: 60px;
            height: 60px;
            border: 3px solid gray;
            text-align: center;
            vertical-align: middle;
            font-size: 20px;
        }
        input[type="number"] {
            font-size: 20px;
            width: 80px;
            padding: 5px;
            background-color: transparent;
            color: white;
            border: 1px solid gray;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #timer {
            display: none;
        }
        .active-cell {
            background-color: gold !important;
            color: black !important;
            font-weight: bold;
        }
        #end-message {
            margin-top: 30px;
            font-size: 24px;
            display: none;
        }
        #retry-button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 18px;
            background-color: gold;
            color: black;
            border: none;
            cursor: pointer;
        }
        #rekorder {
            bottom: 0;
            width: 100%;
            background-color: transparent;
            color: white;
            text-align: center;
            padding: 5px;
            font-size: 16px;
        }
    </style>
</head>

<body>

<table id="grid"></table>
<div id="problem" style="margin-top: 20px; font-size: 24px;"></div>
<input type="number" id="answer" placeholder="Svar">
<div id="timer">Tid: 0 sekunder</div>

<div id="end-message">
    <p id="final-time"></p>
    <button id="retry-button">JA</button>
</div>

<div id="rekorder">
    <div id="dagensRekord">🥇 Dagens rekord: -- sekunder</div>
    <div id="aaretsRekord">🏆 Årets rekord: -- sekunder</div>
</div>

<script>
const grid = document.getElementById("grid");
const problemDiv = document.getElementById("problem");
const answerInput = document.getElementById("answer");
const endMessage = document.getElementById("end-message");
const finalTime = document.getElementById("final-time");
const retryButton = document.getElementById("retry-button");

let problems = [];
for (let i = 1; i <= 9; i++) {
    for (let j = 1; j <= 9; j++) {
        problems.push({x: i, y: j});
    }
}

// Shuffle
for (let i = problems.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [problems[i], problems[j]] = [problems[j], problems[i]];
}

let currentIndex = 0;
let startTime = null;

// Grid
for (let i = 0; i < 9; i++) {
    const row = grid.insertRow();
    for (let j = 0; j < 9; j++) {
        const cell = row.insertCell();
        cell.id = `cell-${i+1}-${j+1}`;
    }
}

function showProblem() {
    if (currentIndex >= problems.length) {
        const totalTime = Math.floor((Date.now() - startTime) / 1000);
        opdaterRekorder(totalTime);
        finalTime.textContent = `Godt klaret! Din tid er ${totalTime} sekunder. Vil du prøve igen?`;
        endMessage.style.display = "block";
        answerInput.style.display = "none";
        problemDiv.style.display = "none";
        return;
    }
    const {x, y} = problems[currentIndex];
    const cell = document.getElementById(`cell-${x}-${y}`);
    cell.classList.add("active-cell");
    cell.textContent = `${x} × ${y}`;
    answerInput.value = "";
    answerInput.focus();
}

function clearCell(x, y, result) {
    const cell = document.getElementById(`cell-${x}-${y}`);
    cell.classList.remove("active-cell");
    cell.textContent = result;
}

answerInput.addEventListener("input", () => {
    const {x, y} = problems[currentIndex];
    const correct = x * y;
    if (parseInt(answerInput.value) === correct) {
        if (!startTime) startTime = Date.now();
        clearCell(x, y, correct);
        currentIndex++;
        showProblem();
    }
});

retryButton.addEventListener("click", () => location.reload());

showProblem();
</script>

<script>
function opdaterRekorder(nyTid) {
    const nu = new Date();

    const dag = JSON.parse(localStorage.getItem("dagensRekord")) || {};
    const aar = JSON.parse(localStorage.getItem("aaretsRekord")) || {};

    const nyDag = !dag.tid || (nu - new Date(dag.dato)) > 86400000 || nyTid < dag.tid;
    const nyAar = !aar.tid || (nu - new Date(aar.dato)) > 365 * 86400000 || nyTid < aar.tid;

    let navn = "";
    if (nyDag || nyAar) {
        navn = prompt("Tillykke! Du har slået en rekord. Skriv dit navn (valgfrit):") || "";
    }

    if (nyDag) {
        localStorage.setItem("dagensRekord", JSON.stringify({ tid: nyTid, dato: nu, navn }));
    }
    if (nyAar) {
        localStorage.setItem("aaretsRekord", JSON.stringify({ tid: nyTid, dato: nu, navn }));
    }

    visRekorder();
}

function visRekorder() {
    const dag = JSON.parse(localStorage.getItem("dagensRekord"));
    const aar = JSON.parse(localStorage.getItem("aaretsRekord"));
    const nu = new Date();

    if (dag && (nu - new Date(dag.dato)) <= 86400000) {
        document.getElementById("dagensRekord").textContent =
            `🥇 Dagens rekord: ${dag.tid} sekunder${dag.navn ? " ("+dag.navn+")" : ""}`;
    }

    if (aar && (nu - new Date(aar.dato)) <= 365 * 86400000) {
        document.getElementById("aaretsRekord").textContent =
            `🏆 Årets rekord: ${aar.tid} sekunder${aar.navn ? " ("+aar.navn+")" : ""}`;
    }
}

window.onload = visRekorder;
</script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/9x9/sw.js');
}
</script>

</body>
</html>
